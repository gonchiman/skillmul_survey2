<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Skill Multiple Search Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Skill Multiple Search Page</h1>

    <form action="/skill_mul" method="post">
        <div>
            <label for="operator_name">Operator Name</label>
            <select id="operator_name" name="operator_name" onchange="this.form.submit()">
                {% for operator_name in operator_names %}
                    <option value="{{ operator_name.value }}"
                        {% if operator_name.value == selected_operator_name %}selected{% endif %}>
                        {{ operator_name.value }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div>
            <span>Skill Type</span>
            {% for skill_type in skill_types %}
                <div>
                    <input
                        type="radio"
                        id="skill_type_{{ skill_type.value }}"
                        name="skill_type"
                        value="{{ skill_type.value }}"
                        onchange="this.form.submit()"
                        {% if skill_type.value == selected_skill_type %}checked{% endif %}
                    >
                    <label for="skill_type_{{ skill_type.value }}">{{ skill_type.value }}</label>
                </div>
            {% endfor %}
        </div>
    </form>

    {% if skill_mul is not none %}
        <div class="result">
            <p>Skill Mul: {{ skill_mul }}</p>
        </div>
    {% endif %}
</body>
</html>
